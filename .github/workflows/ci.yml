name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # CI installs only the dev tools (ruff + pytest) and the lightweight base
      # deps — NOT the heavy backends (transformer-lens / nnsight) and NO model
      # weights. The default test selection is hermetic, pure-logic unit tests,
      # so the green badge reflects code correctness, not network luck.
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check interp experiments tests
          ruff format --check interp experiments tests

      - name: Unit tests
        run: pytest
